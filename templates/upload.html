<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Seat Arranger</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 24px;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
        }

        input[type="number"], 
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        input[type="file"] {
            background: #f9fafb;
            border: 2px dashed #d1d5db;
            cursor: pointer;
        }

        input[type="file"]:hover {
            border-color: var(--primary-color);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .file-info {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hall Seat Arrangement</h2>
    <p class="subtitle">Enter details to generate the seating plan automatically.</p>

    <form action="/upload" method="post" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>Upload Student Files (.xlsx, .csv, .pdf)</label>
            <input type="file" name="files" multiple accept=".xlsx,.xlsm,.xltx,.xltm,.csv,.pdf" required>
            <span class="file-info">You can select multiple files at once.</span>
        </div>

        <div class="form-group">
            <label>Total Number of Halls</label>
            <input type="number" name="halls" placeholder="e.g. 5" required>
        </div>

        <div class="grid-inputs">
            <div class="form-group">
                <label>Seats Per Row</label>
                <input type="number" name="seats" placeholder="e.g. 6" required>
            </div>

            <div class="form-group">
                <label>Rows Per Hall</label>
                <input type="number" name="rows" placeholder="e.g. 10" required>
            </div>
        </div>

        <button type="submit">Generate Arrangement Now &rarr;</button>

    </form>
</div>

</body>
</html>
